# ---------------------------------------------------------
# MANAGER DIPLOMACY & SPEECH LINES
# ---------------------------------------------------------

# First Meetings
Pleased to meet you. = Ah, the new gaffer. Welcome to the league. Let's see if you survive until Christmas.
Greetings. = Look who it is. Don't expect to take any points off us today, mate.
Hello there. = So you're the one the press won't shut up about. Keep your lads off my training pitch and we’ll get along fine.
Welcome. = Welcome to the big leagues. My advice? Invest in some proper shin pads. You're going to need them.

# Neutral / Hostile Greetings
What is it? = What do you want? I've got a training session in ten minutes and my star striker is hungover.
Yes? = Make it quick, the press are waiting outside for my conference.
What do you want? = Is this about the refereeing decisions? Because I saw nothing. What do you want?
State your business. = Get out of my office before I call the stewards. Speak your mind and leave.
We have nothing to discuss. = Make it quick. The fans hate you, the board hates you, and frankly, I'm not your biggest fan either.

# Friendly Greetings
Hello my friend. = Alright, gaffer! Good to see you. Fancy a pint in the boardroom after the match?
It is good to see you. = Always a pleasure. Your lads played some beautiful stuff at the weekend.
Welcome, friend. = Come in, come in! Have a seat. What can we do for you today?

# Declaring War (Kicking Off)
We declare war on you! = The gloves are off. The lads are fired up, the firm's mobilized, and we're taking your stadium apart brick by brick!
Prepare for war! = We're not just here for three points today. We are here to embarrass you in front of your own fans!
This means war! = You've been talking too much to the press! Bring your firm down here. We'll see who's still standing at 90 minutes!
You will pay for this! = Are you having a laugh? You couldn't beat our Under-21s. Come on then, let's av it!

# Peace & Surrender
Let us make peace. = Look, the police bills are getting ridiculous and both our firms are battered. Let's call it a draw and head to the pub.
Peace treaty accepted. = The fans have had their fun, but the FA is threatening point deductions. Time to blow the whistle, yeah?
Peace treaty declined. = The fans are leaving early. It's a humiliation. Surrender your assets now and save yourself the embarrassment.

# Trade & Transfers
We accept your offer. = The paperwork is signed. Good piece of business, that.
I accept. = The fans will love this signing. We have a deal.
We decline your offer. = Are you taking the piss? You couldn't buy my kitman with that offer. Try again.
This is unacceptable. = My board would sack me on the spot if I accepted this. Do better.
I must decline. = Absolute insult of an offer. Come back when you have some actual Transfer Kitty.

# Defeat & Elimination
I have been defeated. = Absolute disgrace. The board's sacked me, we've gone into administration, and it's all your fault. Enjoy the three points.
You have defeated me. = You didn't beat me tactically, you just bought the league! It's an absolute disgrace! I'm clearing out my desk.
